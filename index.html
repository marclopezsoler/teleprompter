<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teleprompter</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #0a0e27;
        color: #fff;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Top toolbar ── */
      #toolbar {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 18px;
        padding: 0 20px;
        height: 52px;
        background: rgba(14, 14, 20, 0.95);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        z-index: 20;
      }

      #status {
        font-size: 0.75rem;
        color: #888;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: color 0.3s;
      }

      #status.idle {
        color: #888;
      }

      #status.playing {
        color: #64b5f6;
      }

      #status.recording {
        color: #ff6b6b;
        animation: pulse-status 1s ease-in-out infinite;
      }

      @keyframes pulse-status {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .toolbar-group {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.8rem;
        color: #aaa;
      }

      input[type="range"] {
        width: 110px;
        height: 4px;
        border-radius: 2px;
        background: rgba(100, 181, 246, 0.2);
        outline: none;
        -webkit-appearance: none;
        appearance: none;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #64b5f6;
        cursor: pointer;
        box-shadow: 0 0 8px rgba(100, 181, 246, 0.4);
        transition: all 0.2s;
      }

      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.3);
        box-shadow: 0 0 12px rgba(100, 181, 246, 0.6);
      }

      input[type="range"]::-moz-range-thumb {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #64b5f6;
        cursor: pointer;
        border: none;
        box-shadow: 0 0 8px rgba(100, 181, 246, 0.4);
        transition: all 0.2s;
      }

      .sep {
        width: 1px;
        height: 28px;
        background: rgba(255, 255, 255, 0.1);
      }

      button {
        padding: 8px 18px;
        border: 1px solid rgba(100, 181, 246, 0.3);
        border-radius: 6px;
        font-size: 0.82rem;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        background: rgba(100, 181, 246, 0.1);
        color: #64b5f6;
      }

      button:hover {
        background: rgba(100, 181, 246, 0.2);
        border-color: rgba(100, 181, 246, 0.6);
      }

      button:active {
        transform: scale(0.98);
      }

      button:disabled {
        opacity: 0.3;
        cursor: default;
      }

      #btn-play {
        background: rgba(100, 181, 246, 0.15);
        border-color: rgba(100, 181, 246, 0.4);
        color: #64b5f6;
      }

      #btn-play:hover:not(:disabled) {
        background: rgba(100, 181, 246, 0.25);
        box-shadow: 0 0 12px rgba(100, 181, 246, 0.2);
      }

      #btn-stop {
        background: rgba(255, 107, 107, 0.15);
        border-color: rgba(255, 107, 107, 0.4);
        color: #ff6b6b;
      }

      #btn-stop:hover:not(:disabled) {
        background: rgba(255, 107, 107, 0.25);
        box-shadow: 0 0 12px rgba(255, 107, 107, 0.2);
      }

      #rec-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ff6b6b;
        display: none;
        animation: blink 0.8s step-start infinite;
        flex-shrink: 0;
        box-shadow: 0 0 8px rgba(255, 107, 107, 0.6);
      }

      @keyframes blink {
        50% {
          opacity: 0.3;
        }
      }

      /* ── Main stage ── */
      #stage {
        flex: 1;
        position: relative;
        overflow: hidden;
        background: #0a0e27;
      }

      video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
        display: block;
        background: #000;
        opacity: 0.3;
        filter: blur(1px);
      }

      /* ── Teleprompter text ── */
      #prompter-wrap {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        overflow: hidden;
        pointer-events: none;
        z-index: 2;
        padding-top: 80px;
      }

      #prompter-text {
        width: min(1000px, 92%);
        font-weight: 500;
        font-size: 56px;
        line-height: 1.8;
        color: rgba(255, 255, 255, 0.95);
        text-align: center;
        padding: 60px 40px;
        transform: translateY(100vh);
        will-change: transform;
        white-space: pre-wrap;
        word-break: break-word;
        text-shadow:
          0 2px 8px rgba(0, 0, 0, 0.3),
          0 8px 24px rgba(0, 0, 0, 0.2),
          0 0 60px rgba(100, 181, 246, 0.1);
        backdrop-filter: blur(8px);
        border-radius: 16px;
        border: 1px solid rgba(100, 181, 246, 0.1);
      }

      /* ── Focus overlay: subtle gradient ── */
      #focus-overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 3;
        background: radial-gradient(
          ellipse 100% 60% at center 30%,
          rgba(0, 0, 0, 0) 0%,
          rgba(0, 0, 0, 0.2) 50%,
          rgba(0, 0, 0, 0.4) 100%
        );
      }

      /* ── Focus line indicator ── */
      #focus-line {
        display: none;
      }

      /* ── Countdown ── */
      #countdown {
        position: absolute;
        inset: 0;
        z-index: 100;
        display: none;
        background: rgba(10, 14, 39, 0.7);
        backdrop-filter: blur(4px);
        align-items: center;
        justify-content: center;
      }

      #countdown-num {
        font-size: 180px;
        font-weight: 700;
        color: #64b5f6;
        text-shadow: 0 0 60px rgba(100, 181, 246, 0.4);
        animation: countdown-scale 0.6s ease-out;
        letter-spacing: -4px;
      }

      @keyframes countdown-scale {
        0% {
          transform: scale(1.3);
          opacity: 0;
        }
        50% {
          opacity: 1;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      #countdown-num.go {
        color: #64b5f6;
        font-size: 120px;
      }

      /* ── Script textarea area ── */
      #script-bar {
        flex-shrink: 0;
        background: rgba(14, 14, 20, 0.95);
        backdrop-filter: blur(10px);
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        padding: 12px 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        z-index: 10;
      }

      #script {
        flex: 1;
        height: 60px;
        background: rgba(20, 30, 60, 0.5);
        color: #ccc;
        border: 1px solid rgba(100, 181, 246, 0.15);
        border-radius: 6px;
        padding: 10px 12px;
        font-size: 0.85rem;
        resize: none;
        font-family: inherit;
        transition: all 0.2s;
        backdrop-filter: blur(4px);
      }

      #script:focus {
        outline: none;
        border-color: rgba(100, 181, 246, 0.4);
        background: rgba(20, 30, 60, 0.7);
        box-shadow: 0 0 12px rgba(100, 181, 246, 0.1);
      }

      .script-label {
        font-size: 0.75rem;
        color: #666;
        white-space: nowrap;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .toolbar-info {
        margin-left: auto;
        font-size: 0.75rem;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
    </style>
  </head>
  <body>
    <!-- Toolbar -->
    <div id="toolbar">
      <div id="rec-dot"></div>
      <span id="status" class="idle">Ready</span>

      <div class="sep"></div>

      <div class="toolbar-group">
        Speed (<span id="speed-val">2</span>):
        <input type="range" id="speed" min="0" max="10" value="2" step="1" />
      </div>

      <div class="sep"></div>

      <button id="btn-play">▶ Play</button>
      <button id="btn-stop" disabled>⏹ Stop</button>

      <span class="toolbar-info">Auto-recording enabled</span>
    </div>

    <!-- Stage -->
    <div id="stage">
      <!-- Fullscreen webcam background -->
      <video id="video" autoplay muted playsinline></video>

      <!-- Countdown -->
      <div id="countdown">
        <span id="countdown-num">3</span>
      </div>

      <!-- Teleprompter text -->
      <div id="prompter-wrap">
        <div id="prompter-text"></div>
      </div>

      <!-- Focus overlay -->
      <div id="focus-overlay"></div>
      <div id="focus-line"></div>
    </div>

    <!-- Script textarea -->
    <div id="script-bar">
      <span class="script-label">Script:</span>
      <textarea id="script">
        Hello, my name is John Doe. I am a software engineer. I live in New York City. I love to code and build things. I am a quick learner and I am always looking for new challenges. I am a team player and I am always looking to help others. I am a problem solver and I am always looking for new solutions. I am a quick learner and I am always looking for new challenges. I am a team player and I am always looking to help others. I am a problem solver and I am always looking for new solutions.
</textarea
      >
    </div>

    <script>
      (async () => {
        const video = document.getElementById("video");
        const promptText = document.getElementById("prompter-text");
        const scriptEl = document.getElementById("script");
        const btnPlay = document.getElementById("btn-play");
        const btnStop = document.getElementById("btn-stop");
        const statusEl = document.getElementById("status");
        const recDot = document.getElementById("rec-dot");
        const speedSlider = document.getElementById("speed");
        const speedVal = document.getElementById("speed-val");
        const countdown = document.getElementById("countdown");
        const countdownNum = document.getElementById("countdown-num");

        let mediaRecorder = null;
        let recordedChunks = [];
        let stream = null;
        let isScrolling = false;
        let animationId = null;
        let scrollSpeed = parseFloat(speedSlider.value);
        let lastTimestamp = null;
        let scrollProgress = 0;

        // ── Camera ────────────────────────────────────────────────
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { width: { ideal: 1920 }, height: { ideal: 1080 } },
            audio: true,
          });
          video.srcObject = stream;
        } catch (err) {
          statusEl.textContent = `Camera error: ${err.message}`;
          btnPlay.disabled = true;
        }

        // ── Speed slider ──────────────────────────────────────────
        speedSlider.addEventListener("input", () => {
          scrollSpeed = parseFloat(speedSlider.value);
          speedVal.textContent = speedSlider.value;
        });

        // ── Script textarea live preview ───────────────────────────
        scriptEl.addEventListener("input", () => {
          promptText.textContent = scriptEl.value;
        });
        promptText.textContent = scriptEl.value;

        // ── Status update ──────────────────────────────────────────
        function updateStatus() {
          if (isScrolling) {
            statusEl.textContent = "🔴 Recording";
            statusEl.className = "recording";
            recDot.style.display = "block";
          } else {
            statusEl.textContent = "Ready";
            statusEl.className = "idle";
            recDot.style.display = "none";
          }
        }

        // ── Smooth scroll animation ────────────────────────────────
        function scrollStep(timestamp) {
          if (!isScrolling) return;

          if (lastTimestamp === null) {
            lastTimestamp = timestamp;
            animationId = requestAnimationFrame(scrollStep);
            return;
          }

          const deltaTime = timestamp - lastTimestamp;
          lastTimestamp = timestamp;

          // Get current Y position with better regex
          const currentTransform = promptText.style.transform;
          let current = (25 * window.innerHeight) / 100; // Default to 100vh

          const match = currentTransform.match(/translateY\(([-\d.]+)px\)/);
          if (match) {
            current = parseFloat(match[1]);
          }

          // Calculate new position with correct velocity
          const velocity = (scrollSpeed * 60) / 1000; // pixels per millisecond at 60fps
          const newPosition = current - velocity * deltaTime;

          promptText.style.transform = `translateY(${newPosition}px)`;

          animationId = requestAnimationFrame(scrollStep);
        }

        function startScroll() {
          promptText.textContent = scriptEl.value;
          promptText.style.transform = "translateY(100vh)";
          isScrolling = true;
          lastTimestamp = null;

          animationId = requestAnimationFrame(scrollStep);
        }

        function stopScroll() {
          if (animationId) {
            cancelAnimationFrame(animationId);
            animationId = null;
          }
          isScrolling = false;
          promptText.style.transform = "translateY(100vh)";
          lastTimestamp = null;
        }

        // ── Countdown timer ────────────────────────────────────────
        function showCountdown(onCountdownFinish) {
          countdown.style.display = "flex";
          let count = 3;
          countdownNum.textContent = count;
          countdownNum.classList.remove("go");

          const countdownInterval = setInterval(() => {
            count--;
            if (count > 0) {
              countdownNum.textContent = count;
            } else if (count === 0) {
              countdownNum.textContent = "Go!";
              countdownNum.classList.add("go");
            } else {
              clearInterval(countdownInterval);
              countdown.style.display = "none";
              // Call the callback after countdown finishes
              onCountdownFinish();
            }
          }, 1000);
        }

        // ── Record ────────────────────────────────────────────────
        btnPlay.addEventListener("click", async () => {
          recordedChunks = [];

          try {
            if (!stream) {
              statusEl.textContent = "Error: No camera stream";
              return;
            }

            let mimeType = "";
            const webmTypes = [
              "video/webm;codecs=vp9,opus",
              "video/webm;codecs=vp8,opus",
              "video/webm",
            ];

            for (const type of webmTypes) {
              if (MediaRecorder.isTypeSupported(type)) {
                mimeType = type;
                break;
              }
            }

            const options = mimeType
              ? { mimeType, videoBitsPerSecond: 8000000 }
              : {};
            mediaRecorder = new MediaRecorder(stream, options);

            mediaRecorder.ondataavailable = (e) => {
              if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
              stopScroll();
              const blob = new Blob(recordedChunks, { type: "video/webm" });
              const url = URL.createObjectURL(blob);
              const a = document.createElement("a");
              a.href = url;
              a.download = `teleprompter-${Date.now()}.webm`;
              a.click();
              URL.revokeObjectURL(url);
              recordedChunks = [];
            };

            btnPlay.disabled = true;
            btnStop.disabled = false;
            updateStatus();

            // Show countdown, then start recording and scrolling
            showCountdown(() => {
              mediaRecorder.start(100);
              startScroll();
              isScrolling = true;
              updateStatus();
            });
          } catch (err) {
            statusEl.textContent = `Error: ${err.message}`;
            console.error("Recording error:", err);
          }
        });

        btnStop.addEventListener("click", () => {
          if (mediaRecorder) {
            mediaRecorder.stop();
          }
          stopScroll();
          isScrolling = false;
          btnPlay.disabled = false;
          btnStop.disabled = true;
          updateStatus();
          statusEl.textContent = "Video saved!";
          setTimeout(() => {
            statusEl.textContent = "Ready";
          }, 2000);
        });

        updateStatus();
      })();
    </script>
  </body>
</html>
